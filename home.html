<body class="bg-[#F8FAFC] h-svh">

    <header>
        <div class="bg-white flex justify-between items-center px-20 py-4 border-b border-[rgb(233,233,233)]">
            <div class="flex gap-1 items-center justify-center">
                <div><img src="./assets/nav-logo.png"></div>
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            </div>

            <div class="flex items-center justify-center gap-3">
                <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
                </label>
                <button class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

        <section class="bg-white w-4/5 mx-auto m-15">

                <button class="btn btn-primary">All</button>
                <button class="btn btn-primary">Open</button>
                <button class="btn btn-primary">Close</button>

            </div>


        </section>

        <!-- issue section -->

        <section class="w-4/5 mx-auto bg-[#FBFBFB]">

            <!-- issues -->

            <div class="bg-white flex items-center justify-between p-6 border-b border-[rgb(228,228,231)]">

                <div class="flex items-center justify-center gap-2">
                    <div class="bg-[#ECE4FF] rounded-full w-12 p-3">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-semibold text-xl">50 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-4">
                    <span class="font-medium"><i class="fa-solid fa-circle text-[#00A96E]"></i>Open</span>

                    <span class="font-medium"><i class="fa-solid fa-circle text-[#A855F7]"></i>Close</span>
                </div>
            </div>

            <!-- issue card -->

            <div id="issue-container" class="grid grid-cols-4 gap-4 m-6">
