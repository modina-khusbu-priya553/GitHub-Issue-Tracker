<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and logo -->
    <title>Git Issue Tracker</title>
    <link rel="icon" type="image/x-icon" href="./assets/github-logo.png">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style.css">
</head>
<!-- bg-[#F8FAFC] -->

<body class="bg-[#F8FAFC] h-svh flex flex-col items-center justify-center px-4">

    <section>
        <div class="bg-white flex flex-col justify-center md:w-[540px] w-full items-center md:gap-8 gap-6 mx-auto rounded-lg p-8 
            shadow-[0_5px_10px_rgba(0,0,0,0.08)]">

            <!-- title -->
            <div class="flex flex-col items-center justify-center gap-2">
                <div>
                    <img src="./assets/github-logo.png" alt="github logo">
                </div>
                <div>
                    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                    <p class="text-gray-600 text-center">Sign in to manage your issues</p>
                </div>                    
            </div>

            <!-- login -->
            
            <form class="w-full flex flex-col items-center gap-3">

                <!-- username -->
                <div class="w-full space-y-1">
                        <legend class="font-medium">Username</legend>
                        <label for="username" class="input rounded-lg w-full">
                            <input id="username"
                            type="text" placeholder="Enter Username"/>
                        </label>
                        <p class="text-sm text-[#4A00FF]">Default: admin</p>                       
                </div>

                <!-- password -->
                <div class="w-full space-y-1">
                        <legend class="font-medium">Password</legend>
                        <label for="password" class="input rounded-lg w-full">
                            <input id="password"
                                type="password" placeholder="Enter Password"/>
                        </label>
                        <p class="text-sm text-[#4A00FF]">Default: admin123</p>
                </div>
                <button id="signinBtn" class="btn btn-primary mt-4 rounded-lg w-full">Sign In</button> 

            </form>
            

            <!-- or -->
            <div class="flex items-center justify-center w-full gap-2">
                <hr class="my-6 w-full border-gray-300">
                    OR
                <hr class="my-6 w-full border-gray-300">
            </div>

            <div class="w-full space-y-2">
                <h3 class="text-[#64748B] text-sm text-center">Demo Credentials:</h3>
                <div class="flex flex-col items-center justify-center gap-1 bg-[#F8FAFC] py-6 rounded-lg">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>


        </div>
    </section>

    <script src="./script.js"></script>

</body>
</html>
